# Título y Detalle general para cuando fallan las validaciones (@Valid)
problemDetail.title.org.springframework.web.bind.MethodArgumentNotValidException=Datos Inválidos
problemDetail.org.springframework.web.bind.MethodArgumentNotValidException=La información enviada contiene uno o más errores de validación.

# --- Validación: Nombre ---
# Formato: Anotacion.nombreObjeto.nombreCampo
NotBlank.moduloRequest.nombre=El nombre es obligatorio.
Size.moduloRequest.nombre=El nombre debe tener entre {2} y {1} caracteres.

# --- Validación: URL ---
NotBlank.moduloRequest.url=La URL es obligatoria.
Size.moduloRequest.url=La URL no puede exceder los {1} caracteres.

# --- Validación: Descripción e Icono ---
Size.moduloRequest.descripcion=La descripción no puede exceder los {1} caracteres.
Size.moduloRequest.icon=El ícono no puede exceder los {1} caracteres.

# --- Validación: Relaciones (IDs) ---
# @NotNull
NotNull.moduloRequest.estadoId=El ID del estado es obligatorio.
NotNull.moduloRequest.subSistemaId=El ID del subsistema es obligatorio.
NotNull.moduloRequest.tipoModuloId=El ID del tipo de módulo es obligatorio.
NotNull.moduloRequest.tipoAplicacionId=El ID del tipo de aplicación es obligatorio.

# @Positive
Positive.moduloRequest.estadoId=El ID del estado debe ser un número positivo.
Positive.moduloRequest.subSistemaId=El ID del subsistema debe ser un número positivo.
Positive.moduloRequest.tipoModuloId=El ID del tipo de módulo debe ser un número positivo.
Positive.moduloRequest.tipoAplicacionId=El ID del tipo de aplicación debe ser un número positivo.

# --- Validación: Roles (Lista) ---
# Aplica a la lista en sí o a sus elementos
NotBlank.moduloRequest.roles=El rol no puede estar vacío.

# --- Validación: NombreId ---
Size.moduloRequest.nombreId=El nombre ID no puede exceder los {1} caracteres.


# --- Errores de Negocio ---

# {0} = Nombre de la entidad (ej. Estado), {1} = ID
entidad.no_encontrada=No existe un {0} con el ID: {1}.

# {0} = Nombre del módulo que se intentó crear
modulo.duplicado=Ya existe un módulo con el nombre: {0}.

# {0} = Nombre de la entidad, {1} = ID
recurso.no_encontrado=No se encontró ningún {0} con el ID: {1}.

# Error 403 Forbidden
security.access_denied=No tiene los permisos necesarios (Rol) para realizar esta acción.

# Error 401 Unauthorized (Sin token o token inválido)
security.unauthorized=Debe iniciar sesión para acceder a este recurso.

# Personalización para HttpMessageNotReadableException (JSON mal formado)
problemDetail.title.org.springframework.http.converter.HttpMessageNotReadableException=Error de Formato
problemDetail.org.springframework.http.converter.HttpMessageNotReadableException=El JSON enviado contiene errores de sintaxis o tipos de datos inválidos.
problemDetail.type.org.springframework.http.converter.HttpMessageNotReadableException=https://coagronet.com/errors/malformed-request