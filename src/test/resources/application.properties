# Test-only overrides to avoid external dependencies (Postgres, env vars, SMTP)

spring.main.allow-circular-references=true

# In-memory DB for tests
spring.datasource.url=jdbc:h2:mem:vantory_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# Disable Postgres-specific property from main config
spring.jpa.properties.hibernate.search_path=

# JWT / Seguridad (32-byte key base64)
jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
jwt.default-role=USER

# Mail placeholders
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# App URLs placeholders
app.verification-url=http://localhost/verify
app.reset-password-url=http://localhost/reset

# Report paths placeholders
path.logos=.
path.logo.empresa=.
